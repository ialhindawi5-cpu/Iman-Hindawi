<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Projects — Iman Al Hindawi</title>
  <meta name="description" content="Web projects by Iman Al Hindawi — full-stack sites with database, authentication and email, deployed on Vercel." />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="theme-color" content="#fdeff4" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-section="philanthropist">
  <!-- Transparent over the full-bleed picture; the scroll handler gives it a
       background once the visitor scrolls to the live projects below. -->
  <header class="site-header" id="header">
    <a href="/" class="brand" id="brand">IMAN&nbsp;AL&nbsp;HINDAWI</a>
    <nav class="nav" id="nav">
      <a href="/">Home</a>
      <a href="/projects">Projects</a>
      <a href="/data">Data</a>
      <a href="/web" aria-current="page">Web</a>
      <a href="/contact">Contact</a>
    </nav>
    <button class="menu-toggle" id="menuToggle" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
  </header>

  <main>
    <section class="section-hero" id="web">
      <div class="section-hero-media" id="philanthropistMedia"></div>
      <div class="section-hero-inner">
        <div class="section-hero-copy">
          <p class="eyebrow" id="philanthropistIndex"></p>
          <h1 id="philanthropistTitle">Web Projects</h1>
          <p id="philanthropistBody"></p>
          <ul class="section-tags" id="philanthropistList"></ul>
          <div class="section-links">
            <a href="/contact" class="section-link" id="philanthropistCta"></a>
            <!-- Opens the projects over the picture; nothing about them sits on
                 the page itself, so this page stays one screen like the others. -->
            <button type="button" class="section-link" id="liveProjectsBtn"
                    aria-haspopup="dialog" aria-expanded="false" aria-controls="projectsOverlay">
              Live projects
            </button>
            <a href="/projects" class="section-link">Project Management</a>
            <a href="/data" class="section-link">Data Analytics</a>
          </div>
        </div>
      </div>
    </section>

    <!-- The live sites, opened by the button above rather than shown on the
         page. Managed from the dashboard; the cards below are the fallback the
         markup ships with. -->
    <div class="projects-overlay" id="projectsOverlay" role="dialog" aria-modal="true"
         aria-labelledby="projectsOverlayTitle" hidden>
      <div class="projects-overlay-inner">
        <div class="projects-overlay-head">
          <h2 class="web-live-title" id="projectsOverlayTitle">Live projects</h2>
          <button type="button" class="projects-overlay-close" id="projectsOverlayClose" aria-label="Close">
            <span aria-hidden="true">×</span>
          </button>
        </div>
        <div class="projects-grid" id="webProjects">
          <a class="project-card" href="https://exam-management-system-kappa.vercel.app/" target="_blank" rel="noopener">
            <span class="project-card-shot" style="background-image:url('assets/uploads/proj-exam.png?v=2')"></span>
            <span class="project-card-foot">
              <span class="project-card-name">Exam System</span>
              <span class="project-card-go">View live project ↗</span>
            </span>
          </a>
          <a class="project-card" href="https://hibas-bakery.vercel.app/" target="_blank" rel="noopener">
            <span class="project-card-shot" style="background-image:url('assets/uploads/proj-bakery.png?v=2')"></span>
            <span class="project-card-foot">
              <span class="project-card-name">Hiba's Bakery</span>
              <span class="project-card-go">View live project ↗</span>
            </span>
          </a>
          <a class="project-card" href="https://makeup-by-ikbal.vercel.app/" target="_blank" rel="noopener">
            <span class="project-card-shot" style="background-image:url('assets/uploads/proj-makeup.png?v=2')"></span>
            <span class="project-card-foot">
              <span class="project-card-name">Makeup by Ikbal</span>
              <span class="project-card-go">View live project ↗</span>
            </span>
          </a>
        </div>
      </div>
    </div>
  </main>


  <script src="brand-fonts.js"></script>
  <script src="social-icons.js"></script>
  <script src="cursor.js"></script>
  <script src="script.js"></script>
</body>
</html>
