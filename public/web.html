<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Projects — Iman Al Hindawi</title>
  <meta name="description" content="Web projects by Iman Al Hindawi — full-stack sites with database, authentication and email, deployed on Vercel." />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="theme-color" content="#fdeff4" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-section="philanthropist">
  <!-- Transparent over the full-bleed picture; the scroll handler gives it a
       background once the visitor scrolls to the live projects below. -->
  <header class="site-header" id="header">
    <a href="/" class="brand" id="brand">IMAN&nbsp;AL&nbsp;HINDAWI</a>
    <nav class="nav" id="nav">
      <a href="/">Home</a>
      <a href="/projects">Projects</a>
      <a href="/data">Data</a>
      <a href="/web" aria-current="page">Web</a>
      <a href="/contact">Contact</a>
    </nav>
    <button class="menu-toggle" id="menuToggle" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
  </header>

  <main>
    <section class="section-hero" id="web">
      <div class="section-hero-media" id="philanthropistMedia"></div>
      <div class="section-hero-inner">
        <div class="section-hero-copy">
          <p class="eyebrow" id="philanthropistIndex"></p>
          <h1 id="philanthropistTitle">Web Projects</h1>
          <p id="philanthropistBody"></p>
          <ul class="section-tags" id="philanthropistList"></ul>
          <div class="section-links">
            <a href="/contact" class="section-link" id="philanthropistCta"></a>
            <a href="/projects" class="section-link">Project Management</a>
            <a href="/data" class="section-link">Data Analytics</a>
          </div>
        </div>
      </div>
    </section>

    <!-- The live sites stay below the picture: they are the point of this
         section and are managed from the dashboard. -->
    <section class="web-live page">
      <h2 class="web-live-title">Live projects</h2>
      <div class="web-live-frame">
        <div class="slideshow" id="webSlideshow">
          <a class="slide active" href="https://exam-management-system-kappa.vercel.app/" target="_blank" rel="noopener"
             style="background-image:url('assets/uploads/proj-exam.png?v=2')">
            <span class="slide-label">Exam System <span>Visit ↗</span></span>
          </a>
          <a class="slide" href="https://hibas-bakery.vercel.app/" target="_blank" rel="noopener"
             style="background-image:url('assets/uploads/proj-bakery.png?v=2')">
            <span class="slide-label">Hiba's Bakery <span>Visit ↗</span></span>
          </a>
          <a class="slide" href="https://makeup-by-ikbal.vercel.app/" target="_blank" rel="noopener"
             style="background-image:url('assets/uploads/proj-makeup.png?v=2')">
            <span class="slide-label">Makeup by Ikbal <span>Visit ↗</span></span>
          </a>
          <div class="slide-dots" id="slideDots">
            <button class="dot active" type="button" data-i="0" aria-label="Exam System"></button>
            <button class="dot" type="button" data-i="1" aria-label="Hiba's Bakery"></button>
            <button class="dot" type="button" data-i="2" aria-label="Makeup by Ikbal"></button>
          </div>
        </div>
      </div>
    </section>
  </main>


  <script src="brand-fonts.js"></script>
  <script src="social-icons.js"></script>
  <script src="cursor.js"></script>
  <script src="script.js"></script>
</body>
</html>
