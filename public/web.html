<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Projects — Iman Al Hindawi</title>
  <meta name="description" content="Web projects by Iman Al Hindawi — full-stack sites with database, authentication and email, deployed on Vercel." />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="theme-color" content="#fdeff4" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-section="philanthropist">
  <!-- Transparent over the full-bleed picture; the scroll handler gives it a
       background once the visitor scrolls to the live projects below. -->
  <header class="site-header" id="header">
    <a href="/" class="brand" id="brand">IMAN&nbsp;AL&nbsp;HINDAWI</a>
    <nav class="nav" id="nav">
      <a href="/">Home</a>
      <a href="/projects">Projects</a>
      <a href="/data">Data</a>
      <a href="/web" aria-current="page">Web</a>
      <a href="/contact">Contact</a>
    </nav>
    <button class="menu-toggle" id="menuToggle" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
  </header>

  <main>
    <section class="section-hero" id="web">
      <div class="section-hero-media" id="philanthropistMedia"></div>
      <div class="section-hero-inner">
        <div class="section-hero-copy">
          <p class="eyebrow" id="philanthropistIndex"></p>
          <h1 id="philanthropistTitle">Web Projects</h1>
          <p id="philanthropistBody"></p>
          <ul class="section-tags" id="philanthropistList"></ul>
          <div class="section-links">
            <a href="/contact" class="section-link" id="philanthropistCta"></a>
            <a href="/projects" class="section-link">Project Management</a>
            <a href="/data" class="section-link">Data Analytics</a>
          </div>
        </div>
      </div>
    </section>

    <!-- The live sites stay below the picture: they are the point of this
         section and are managed from the dashboard. One button per project,
         in a grid — the site itself is a click away rather than on show. -->
    <section class="web-live page">
      <h2 class="web-live-title">Live projects</h2>
      <!-- Static fallback: the real buttons are rebuilt from the admin content. -->
      <div class="web-live-grid" id="webProjects">
        <a class="project-button" href="https://exam-management-system-kappa.vercel.app/" target="_blank" rel="noopener">
          <span class="project-button-name">Exam System</span>
          <span class="project-button-go">View live project ↗</span>
        </a>
        <a class="project-button" href="https://hibas-bakery.vercel.app/" target="_blank" rel="noopener">
          <span class="project-button-name">Hiba's Bakery</span>
          <span class="project-button-go">View live project ↗</span>
        </a>
        <a class="project-button" href="https://makeup-by-ikbal.vercel.app/" target="_blank" rel="noopener">
          <span class="project-button-name">Makeup by Ikbal</span>
          <span class="project-button-go">View live project ↗</span>
        </a>
      </div>
    </section>
  </main>


  <script src="brand-fonts.js"></script>
  <script src="social-icons.js"></script>
  <script src="cursor.js"></script>
  <script src="script.js"></script>
</body>
</html>
