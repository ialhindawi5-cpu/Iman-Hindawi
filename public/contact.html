<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Iman Al Hindawi</title>
  <meta name="description" content="Get in touch with Iman Al Hindawi — project coordination, data analytics, or a new website. Based in Beirut, Lebanon." />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="theme-color" content="#fdeff4" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header static" id="header">
    <a href="/" class="brand" id="brand">IMAN&nbsp;AL&nbsp;HINDAWI</a>
    <nav class="nav" id="nav">
      <a href="/">Home</a>
      <a href="/projects">Projects</a>
      <a href="/data">Data</a>
      <a href="/web">Web</a>
      <a href="/contact" aria-current="page">Contact</a>
    </nav>
    <button class="menu-toggle" id="menuToggle" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
  </header>

  <main class="page">
    <!-- The intro paragraph opens the Project Management page instead. -->
    <section class="contact" id="contact">
      <div class="reveal">
        <p class="eyebrow light" id="contactEyebrow"></p>
        <h1 id="contactHeading">Let’s work together</h1>
        <p class="contact-sub" id="contactSub"></p>

        <form class="contact-form" id="contactForm" novalidate>
          <div class="cf-row">
            <input type="text" name="name" id="cfName" placeholder="Your name" required />
            <input type="email" name="email" id="cfEmail" placeholder="Your email" required />
          </div>
          <input type="tel" name="phone" id="cfPhone" class="cf-phone" placeholder="Your phone number" required />
          <textarea name="message" id="cfMessage" rows="5" placeholder="Your message" required></textarea>
          <button type="submit" id="cfSubmit">Send message</button>
          <p class="cf-status" id="cfStatus" role="status"></p>
        </form>
      </div>
    </section>

    <!-- In place of the footer: the same circled icons as the home page, built
         from the socials and the address under Settings → Contact info. -->
    <nav class="social-circles" id="socialCircles" aria-label="Contact and social links"></nav>
  </main>

  <script src="brand-fonts.js"></script>
  <script src="social-icons.js"></script>
  <script src="cursor.js"></script>
  <script src="script.js"></script>
</body>
</html>
