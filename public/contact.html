<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Iman Al Hindawi</title>
  <meta name="description" content="Get in touch with Iman Al Hindawi — project coordination, data analytics, or a new website. Based in Beirut, Lebanon." />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="theme-color" content="#fdeff4" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header static" id="header">
    <a href="/" class="brand" id="brand">IMAN&nbsp;AL&nbsp;HINDAWI</a>
    <nav class="nav" id="nav">
      <a href="/">Home</a>
      <a href="/projects">Projects</a>
      <a href="/data">Data</a>
      <a href="/web">Web</a>
      <a href="/contact" aria-current="page">Contact</a>
      <a href="/portfolio">Full profile</a>
    </nav>
    <button class="menu-toggle" id="menuToggle" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
  </header>

  <main class="page">
    <!-- The intro paragraph and the quote live here now that the one-page
         layout is gone; both are still edited under Home in the dashboard. -->
    <section class="intro reveal">
      <p id="introText"></p>
    </section>

    <section class="contact" id="contact">
      <div class="reveal">
        <p class="eyebrow light" id="contactEyebrow"></p>
        <h1 id="contactHeading">Let’s work together</h1>
        <p class="contact-sub" id="contactSub"></p>

        <form class="contact-form" id="contactForm" novalidate>
          <div class="cf-row">
            <input type="text" name="name" id="cfName" placeholder="Your name" required />
            <input type="email" name="email" id="cfEmail" placeholder="Your email" required />
          </div>
          <input type="tel" name="phone" id="cfPhone" class="cf-phone" placeholder="Your phone number" required />
          <textarea name="message" id="cfMessage" rows="5" placeholder="Your message" required></textarea>
          <button type="submit" id="cfSubmit">Send message</button>
          <p class="cf-status" id="cfStatus" role="status"></p>
        </form>
      </div>
    </section>

    <section class="quote reveal">
      <blockquote id="quoteText"></blockquote>
      <cite id="quoteCite"></cite>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-grid">
      <div class="footer-brand">
        <span class="footer-name" id="footerName">Iman Al Hindawi</span>
        <p class="footer-tag" id="footerTag">Project Manager · Data Analyst · PMP®</p>
      </div>

      <div class="footer-col">
        <h4>Explore</h4>
        <a href="/">Home</a>
        <a href="/projects">Project Management</a>
        <a href="/data">Data Analytics</a>
        <a href="/web">Web Projects</a>
        <a href="/contact">Contact</a>
        <a href="/portfolio">Full profile</a>
      </div>

      <div class="footer-col">
        <h4>Connect</h4>
        <a href="#" id="footerEmail" class="footer-email"></a>
        <div class="socials" id="socialsList"></div>
      </div>
    </div>

    <div class="footer-bottom">
      <span>© <span id="year"></span> <span id="footerNameBottom">Iman Al Hindawi</span>. All rights reserved.</span>
      <a href="/" class="footer-top-link">Home ↑</a>
    </div>
  </footer>

  <script src="brand-fonts.js"></script>
  <script src="social-icons.js"></script>
  <script src="cursor.js"></script>
  <script src="script.js"></script>
</body>
</html>
